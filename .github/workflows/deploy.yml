name: deploy

on:
  push:
    branches: [dev, staging, main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  RG: admiro-rg-weu
  ACR_NAME: acradmiroweu

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Map branch to deployment config
        shell: bash
        run: |
          set -euo pipefail

          BR="${GITHUB_REF_NAME}"
          echo "BR=$BR" >> "$GITHUB_ENV"
          echo "TAG=${BR}-${GITHUB_SHA}" >> "$GITHUB_ENV"

          case "$BR" in
            dev)
              {
                echo "BACK_APP=admiro-backend-dev-weu"
                echo "ADMIRO_ENV=dev"
                echo "SWA_TOKEN=${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIRO_DEV }}"
                echo "ADMIRO_CORS_ORIGINS=${{ secrets.ADMIRO_CORS_ORIGINS_DEV }}"
                echo "ADMIRO_PARQUET_STORAGE_ACCOUNT=${{ secrets.ADMIRO_PARQUET_STORAGE_ACCOUNT }}"
                echo "ADMIRO_PARQUET_CONTAINER=admiro-data"
                echo "ADMIRO_PARQUET_PREFIX=v1"
                echo "ADMIRO_PARQUET_ANON=false"
              } >> "$GITHUB_ENV"
              ;;
            staging)
              {
                echo "BACK_APP=admiro-backend-staging-weu"
                echo "ADMIRO_ENV=staging"
                echo "SWA_TOKEN=${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIRO_STAGING }}"
                echo "ADMIRO_CORS_ORIGINS=${{ secrets.ADMIRO_CORS_ORIGINS_STAGING }}"
                echo "ADMIRO_PARQUET_STORAGE_ACCOUNT=${{ secrets.ADMIRO_PARQUET_STORAGE_ACCOUNT }}"
                echo "ADMIRO_PARQUET_CONTAINER=admiro-data"
                echo "ADMIRO_PARQUET_PREFIX=v1"
                echo "ADMIRO_PARQUET_ANON=false"
              } >> "$GITHUB_ENV"
              ;;
            main)
              {
                echo "BACK_APP=admiro-backend-prod-weu"
                echo "ADMIRO_ENV=prod"
                echo "SWA_TOKEN=${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIRO_PROD }}"
                echo "ADMIRO_CORS_ORIGINS=${{ secrets.ADMIRO_CORS_ORIGINS_PROD }}"
                echo "ADMIRO_PARQUET_STORAGE_ACCOUNT=${{ secrets.ADMIRO_PARQUET_STORAGE_ACCOUNT }}"
                echo "ADMIRO_PARQUET_CONTAINER=admiro-data"
                echo "ADMIRO_PARQUET_PREFIX=v1"
                echo "ADMIRO_PARQUET_ANON=false"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported branch: $BR" >&2
              exit 1
              ;;
          esac

      - name: Validate required deployment variables
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            BACK_APP
            ADMIRO_ENV
            SWA_TOKEN
            ADMIRO_CORS_ORIGINS
            ADMIRO_PARQUET_STORAGE_ACCOUNT
            ADMIRO_PARQUET_CONTAINER
            ADMIRO_PARQUET_PREFIX
            ADMIRO_PARQUET_ANON
          )

          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required value: $var" >&2
              exit 1
            fi
          done

      - name: Resolve ACR server
        shell: bash
        run: |
          set -euo pipefail
          ACR_SERVER=$(az acr show -g "$RG" -n "$ACR_NAME" --query loginServer -o tsv)
          echo "ACR_SERVER=$ACR_SERVER" >> "$GITHUB_ENV"

      - name: Refresh mirrored Python base image
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          IMPORT_ARGS=(
            --name "$ACR_NAME"
            --source docker.io/library/python:3.12-slim
            --image base/python:3.12-slim
            --force
          )

          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Using authenticated Docker Hub import."
            IMPORT_ARGS+=(--username "$DOCKERHUB_USERNAME" --password "$DOCKERHUB_TOKEN")
          else
            echo "Docker Hub credentials not configured; attempting anonymous import."
          fi

          if az acr import "${IMPORT_ARGS[@]}"; then
            echo "Base image refreshed in ACR."
            exit 0
          fi

          echo "Base import failed. Checking if base/python:3.12-slim already exists in ACR..."
          TAG_EXISTS=$(az acr repository show-tags \
            --name "$ACR_NAME" \
            --repository base/python \
            --query "contains(@, '3.12-slim')" \
            -o tsv || echo "false")

          if [ "$TAG_EXISTS" = "true" ]; then
            echo "Using existing mirrored base image in ACR."
            exit 0
          fi

          echo "No mirrored base image available and import failed."
          exit 1

      - name: Build and push backend
        shell: bash
        run: |
          set -euo pipefail
          az acr build -g "$RG" -r "$ACR_NAME" \
            -t "admiro-backend:${TAG}" \
            -f backend/Dockerfile \
            ./backend

      - name: Deploy backend image and replace env vars
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update -g "$RG" -n "$BACK_APP" \
            --image "$ACR_SERVER/admiro-backend:${TAG}" \
            --replace-env-vars \
              ADMIRO_ENV="$ADMIRO_ENV" \
              ADMIRO_CORS_ORIGINS="$ADMIRO_CORS_ORIGINS" \
              ADMIRO_PARQUET_STORAGE_ACCOUNT="$ADMIRO_PARQUET_STORAGE_ACCOUNT" \
              ADMIRO_PARQUET_CONTAINER="$ADMIRO_PARQUET_CONTAINER" \
              ADMIRO_PARQUET_PREFIX="$ADMIRO_PARQUET_PREFIX" \
              ADMIRO_PARQUET_ANON="$ADMIRO_PARQUET_ANON"

      - name: Disable backend auth gate
        shell: bash
        run: |
          set -euo pipefail
          az containerapp auth update -g "$RG" -n "$BACK_APP" \
            --enabled false \
            --yes

      - name: Resolve backend URL
        shell: bash
        run: |
          set -euo pipefail
          BACK_FQDN=$(az containerapp show -g "$RG" -n "$BACK_APP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "BACKEND_URL=https://${BACK_FQDN}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          VITE_API_BASE_URL="$BACKEND_URL" npm run build
          cp staticwebapp.config.json dist/

      - name: Deploy frontend to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true
